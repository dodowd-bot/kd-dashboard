<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ciara Somers Team · Commercial Intelligence</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070D1A;--surface:#0F1829;--card:#141E30;--border:#1E2D42;
  --text:#E8EDF5;--muted:#8899AA;--accent:#0EA5E9;--accent2:#3B82F6;
  --green:#22C55E;--amber:#F59E0B;--red:#EF4444;--dim:#334155;
  --hover:#1A2640;
}
html{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px}
body{min-height:100vh}

/* ── HEADER ── */
.hdr{background:linear-gradient(135deg,#0B1628 0%,#0F2040 100%);
  border-bottom:1px solid var(--border);padding:20px 28px 0}
.hdr-top{display:flex;align-items:baseline;gap:20px;margin-bottom:16px}
.hdr-title{font-size:22px;font-weight:700;letter-spacing:.5px;color:#fff}
.hdr-subtitle{font-size:13px;color:var(--muted)}
.hdr-date{margin-left:auto;font-size:12px;color:var(--muted)}

/* ── AE TABS ── */
.tabs{display:flex;gap:2px;flex-wrap:wrap}
.tab{padding:8px 14px;border-radius:6px 6px 0 0;cursor:pointer;font-size:12.5px;
  font-weight:500;color:var(--muted);transition:all .15s;border:1px solid transparent;
  border-bottom:none;white-space:nowrap}
.tab:hover{background:var(--surface);color:var(--text)}
.tab.active{background:var(--surface);color:var(--accent);
  border-color:var(--border);border-bottom-color:var(--surface)}
.tab-badge{display:inline-block;margin-left:5px;background:var(--dim);
  color:var(--muted);padding:1px 6px;border-radius:10px;font-size:11px}
.tab.active .tab-badge{background:var(--accent2);color:#fff}

/* ── MAIN ── */
.main{padding:24px 28px}

/* ── METRIC CARDS ── */
.metrics{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:24px}
.metric{background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:16px 18px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.metric:hover{border-color:var(--accent);transform:translateY(-1px);
  box-shadow:0 4px 20px rgba(14,165,233,.15)}
.metric.active-filter{border-color:var(--accent);background:#0C1F35;
  box-shadow:0 0 0 1px var(--accent),0 4px 20px rgba(14,165,233,.2)}
.metric-val{font-size:32px;font-weight:700;line-height:1;color:#fff;margin-bottom:4px}
.metric-label{font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;
  color:var(--muted)}
.metric-sub{font-size:11px;color:var(--muted);margin-top:4px}
.metric-accent{position:absolute;top:0;left:0;width:3px;height:100%;border-radius:10px 0 0 10px}

/* ── PANELS ROW ── */
.panels{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.panel{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 20px}
.panel-title{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
  color:var(--muted);margin-bottom:14px}

/* ── CLOUD DISTRIBUTION ── */
.cloud-bars{display:flex;flex-direction:column;gap:8px}
.cloud-bar-row{display:flex;align-items:center;gap:10px;cursor:pointer;
  padding:4px 0;border-radius:4px;transition:background .15s}
.cloud-bar-row:hover{background:var(--hover)}
.cloud-bar-row.active-filter{background:#0C1F35}
.cbl{width:90px;font-size:12px;color:var(--muted);text-align:right;flex-shrink:0}
.cbd{flex:1;height:20px;border-radius:4px;position:relative;background:var(--dim);overflow:hidden}
.cbd-fill{height:100%;border-radius:4px;transition:width .3s}
.cbd-count{position:absolute;right:8px;top:0;height:100%;display:flex;
  align-items:center;font-size:11px;font-weight:600;color:#fff}

/* ── ENGAGEMENT ── */
.eng-rows{display:flex;flex-direction:column;gap:8px}
.eng-row{display:flex;align-items:center;gap:10px;cursor:pointer;padding:4px 0;
  border-radius:4px;transition:background .15s}
.eng-row:hover{background:var(--hover)}
.eng-row.active-filter{background:#0C1F35}
.eng-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.eng-label{width:140px;font-size:12.5px;flex-shrink:0}
.eng-bar{flex:1;height:16px;border-radius:4px;background:var(--dim);position:relative;overflow:hidden}
.eng-fill{height:100%;border-radius:4px}
.eng-count{font-size:12px;font-weight:600;width:36px;text-align:right;flex-shrink:0}

/* ── SEARCH + SORT BAR ── */
.toolbar{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.search-wrap{position:relative;flex:0 0 260px}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.4}
#search{background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:7px 10px 7px 32px;color:var(--text);font-size:13px;width:100%;outline:none}
#search:focus{border-color:var(--accent)}
.sort-label{font-size:11px;color:var(--muted)}
.sort-btn{background:var(--card);border:1px solid var(--border);border-radius:6px;
  padding:6px 12px;font-size:12px;color:var(--muted);cursor:pointer;transition:all .15s}
.sort-btn:hover,.sort-btn.active{border-color:var(--accent);color:var(--accent)}
.filter-pill{background:#0C1F35;border:1px solid var(--accent);border-radius:20px;
  padding:4px 10px 4px 8px;font-size:12px;color:var(--accent);
  display:flex;align-items:center;gap:6px}
.filter-pill button{background:none;border:none;color:var(--accent);cursor:pointer;
  font-size:14px;line-height:1;padding:0}
.result-count{font-size:12px;color:var(--muted);margin-left:auto}

/* ── TABLE ── */
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead tr{background:#0C1729}
th{padding:10px 14px;font-size:11px;font-weight:700;letter-spacing:.7px;
  text-transform:uppercase;color:var(--muted);text-align:left;white-space:nowrap;
  cursor:pointer;user-select:none;border-bottom:1px solid var(--border)}
th:hover{color:var(--text)}
th.sort-asc::after{content:" ▲"}
th.sort-desc::after{content:" ▼"}
.account-row{cursor:pointer;transition:background .12s;border-bottom:1px solid var(--border)}
.account-row:hover{background:var(--hover)}
.account-row:last-child{border-bottom:none}
td{padding:10px 14px;vertical-align:middle}
.acct-name{font-weight:600;font-size:13.5px;color:#fff}
.acct-ae{font-size:11px;color:var(--muted);margin-top:1px}
.expander{width:24px;text-align:center;color:var(--muted);font-size:12px}

/* ── CLOUD BADGES ── */
.cloud-badge{display:inline-block;padding:2px 8px;border-radius:12px;
  font-size:10.5px;font-weight:600;color:#fff;margin:1px 2px 1px 0;white-space:nowrap}
.clouds-wrap{display:flex;flex-wrap:wrap;gap:0}
.no-clouds{font-size:11px;color:var(--dim);font-style:italic}

/* ── LAST TOUCH ── */
.touch-date{font-size:12px;font-weight:600;color:var(--text)}
.touch-contact{font-size:11.5px;color:var(--accent)}
.touch-subject{font-size:11px;color:var(--muted);margin-top:1px;
  max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.touch-stale{color:var(--red)}
.touch-warm{color:var(--amber)}
.touch-fresh{color:var(--green)}

/* ── SENTIMENT ── */
.sentiment{display:inline-flex;align-items:center;gap:5px;font-size:12px}
.s-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.s-pos .s-dot{background:var(--green)} .s-pos{color:var(--green)}
.s-neg .s-dot{background:var(--red)}  .s-neg{color:var(--red)}
.s-neu .s-dot{background:var(--muted)} .s-neu{color:var(--muted)}

/* ── AOV ── */
.aov-val{font-size:13px;font-weight:700;color:var(--text);text-align:right}

/* ── EXPANDED DETAIL ── */
.detail-row{display:none;background:#0B1628;border-bottom:1px solid var(--border)}
.detail-row.open{display:table-row}
.detail-inner{padding:16px 20px 20px 40px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}
.detail-section{}
.detail-label{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
  color:var(--muted);margin-bottom:8px}
.conv-item{padding:8px 10px;background:var(--card);border-radius:6px;
  border:1px solid var(--border);margin-bottom:6px}
.conv-date{font-size:11px;font-weight:600;color:var(--muted)}
.conv-who{font-size:12.5px;font-weight:600;color:var(--accent);margin:2px 0}
.conv-title{font-size:11px;color:var(--muted)}
.conv-subj{font-size:12px;color:var(--text);margin-top:2px}
.cloud-detail-item{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.upsell-item{padding:8px 10px;background:var(--card);border-radius:6px;
  border-left:3px solid var(--green);border-right:1px solid var(--border);
  border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:6px}
.upsell-type{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--green)}
.upsell-name{font-size:12px;color:var(--text);margin:2px 0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px}
.upsell-meta{font-size:11px;color:var(--muted)}
.no-data{font-size:12px;color:var(--dim);font-style:italic}

/* ── OPEN CASES BADGE ── */
.cases-badge{display:inline-block;padding:2px 7px;border-radius:10px;
  font-size:11px;font-weight:600}
.cases-hot{background:#3F0A0A;color:var(--red)}
.cases-warm{background:#3F2A0A;color:var(--amber)}

/* ── EMPTY STATE ── */
.empty{padding:48px;text-align:center;color:var(--muted)}
.empty-icon{font-size:32px;margin-bottom:8px}
</style>
</head>

  </div>
</div>

const AES = ["Andrew Keyes", "Craig Jones", "Jack Gargan", "Jane Slevin", "Jean O'Connor", "Jessica Murray", "Ronan McKeown", "Sean OConnor", "Utku Ceylan"];

let currentAE = 'ALL';
let activeFilter = null;  // {type, value, label}
let sortCol = 'aov';
let sortDir = 'desc';

function fmtAOV(v) {
  if (!v) return '—';
  if (v >= 1000000) return '£' + (v/1000000).toFixed(1) + 'M';
  if (v >= 1000) return '£' + Math.round(v/1000) + 'k';
  return '£' + v;
}

function sentimentClass(s) {
  if (!s || s === 'Neutral') return 's-neu';
  if (s === 'Positive') return 's-pos';
  return 's-neg';
}

function touchClass(days) {
  if (days === null || days === undefined) return 'touch-stale';
  if (days <= 30) return 'touch-fresh';
  if (days <= 60) return 'touch-warm';
  return 'touch-stale';
}

function getAEData(ae) {
  if (ae === 'ALL') return ALL_DATA;
  return ALL_DATA.filter(a => a.ae === ae);
}

function getFilteredData() {
  let d = getAEData(currentAE);
  if (activeFilter) {
    d = d.filter(activeFilter.fn);
  }
  const q = document.getElementById('search').value.toLowerCase().trim();
  if (q) d = d.filter(a => a.name.toLowerCase().includes(q) || (a.ae||'').toLowerCase().includes(q));
  return d;
}

function getSortedData() {
  const d = getFilteredData();
  const dir = sortDir === 'asc' ? 1 : -1;
  return [...d].sort((a, b) => {
    let av = a[sortCol], bv = b[sortCol];
    if (av === null || av === undefined) av = dir > 0 ? Infinity : -Infinity;
    if (bv === null || bv === undefined) bv = dir > 0 ? Infinity : -Infinity;
    if (typeof av === 'string') return dir * av.localeCompare(bv);
    return dir * (av - bv);
  });
}

function setSort(col) {
  if (sortCol === col) sortDir = sortDir === 'desc' ? 'asc' : 'desc';
  else { sortCol = col; sortDir = col === 'name' ? 'asc' : 'desc'; }
  render();
}

function setFilter(type, fn, label) {
  if (activeFilter && activeFilter.type === type && activeFilter.label === label) {
    activeFilter = null;
  } else {
    activeFilter = { type, fn, label };
  }
  render();
}

function clearFilter() {
  activeFilter = null;
  render();
}

function setAE(ae) {
  currentAE = ae;
  activeFilter = null;
  render();
}

// ── TABS ──
function renderTabs() {
  const el = document.getElementById('aeTabs');
  let html = `<div class="tab ${currentAE==='ALL'?'active':''}" onclick="setAE('ALL')">
    All Team <span class="tab-badge">${ALL_DATA.length}</span></div>`;
  for (const ae of AES) {
    const n = getAEData(ae).length;
    const first = ae.split(' ')[0];
    html += `<div class="tab ${currentAE===ae?'active':''}" onclick="setAE('${ae.replace(/'/g,"\'")}')">
      ${first} <span class="tab-badge">${n}</span></div>`;
  }
  el.innerHTML = html;
}

// ── METRICS ──
function renderMetrics(d) {
  const total = d.length;
  const totalAOV = d.reduce((s,a) => s+(a.aov||0), 0);
  const over60 = d.filter(a => (a.lastTouchDays||999) > 60).length;
  const over30 = d.filter(a => (a.lastTouchDays||999) > 30).length;
  const openCases = d.reduce((s,a) => s+(a.openCases||0), 0);
  const caseAccts = d.filter(a => (a.openCases||0) > 0).length;
  const recentUpsell = d.filter(a => a.lastUpsellDays !== null && a.lastUpsellDays <= 90).length;
  const multiCloud = d.filter(a => a.cloudCount >= 2).length;
  const noContact = d.filter(a => !a.lastTouchContact).length;

  function card(val, label, sub, color, filterFn, filterLabel, ftype) {
    const isActive = activeFilter && activeFilter.type === ftype && activeFilter.label === filterLabel;
    return `<div class="metric${isActive?' active-filter':''}" onclick="setFilter('${ftype}',(${filterFn}),'${filterLabel}')">
      <div class="metric-accent" style="background:${color}"></div>
      <div class="metric-val">${val}</div>
      <div class="metric-label">${label}</div>
      ${sub ? `<div class="metric-sub">${sub}</div>` : ''}
    </div>`;
  }

  const el = document.getElementById('metricCards');
  el.innerHTML =
    card(total, 'Spending Accounts', fmtAOV(totalAOV)+' combined AOV', '#0EA5E9',
      `a => true`, 'all accounts', 'all') +
    card(multiCloud, 'Multi-Cloud Accounts', '2+ Salesforce products', '#22C55E',
      `a => a.cloudCount >= 2`, 'multi-cloud', 'clouds2') +
    card(over30, '30+ Day Silence', 'No meaningful contact', '#F59E0B',
      `a => (a.lastTouchDays||999) > 30`, '30+ days silent', 'eng30') +
    card(over60, '60+ Day Silence', 'At risk — prioritise', '#EF4444',
      `a => (a.lastTouchDays||999) > 60`, '60+ days silent', 'eng60') +
    card(recentUpsell, 'Upsells — 90 Days', 'Recent expansion wins', '#A855F7',
      `a => a.lastUpsellDays !== null && a.lastUpsellDays <= 90`, 'upsell last 90d', 'upsell90') +
    card(openCases, 'Open Cases', caseAccts+' accounts affected', '#F87171',
      `a => (a.openCases||0) > 0`, 'open cases', 'cases');
}

// ── CLOUD DISTRIBUTION ──
function renderCloudDist(d) {
  const max = d.length || 1;
  const buckets = [
    {label:'No data', count:d.filter(a=>a.cloudCount===0).length, color:'#334155',
      fn:`a => a.cloudCount===0`, key:'c0'},
    {label:'1 cloud',  count:d.filter(a=>a.cloudCount===1).length, color:'#00A1E0',
      fn:`a => a.cloudCount===1`, key:'c1'},
    {label:'2 clouds', count:d.filter(a=>a.cloudCount===2).length, color:'#00B5A2',
      fn:`a => a.cloudCount===2`, key:'c2'},
    {label:'3+ clouds',count:d.filter(a=>a.cloudCount>=3).length, color:'#22C55E',
      fn:`a => a.cloudCount>=3`, key:'c3+'},
  ];
  let html = '<div class="cloud-bars">';
  for (const b of buckets) {
    const pct = Math.round(b.count/max*100);
    const isActive = activeFilter && activeFilter.type === 'cloudDist' && activeFilter.label === b.key;
    html += `<div class="cloud-bar-row${isActive?' active-filter':''}"
      onclick="setFilter('cloudDist',(${b.fn}),'${b.key}')">
      <div class="cbl">${b.label}</div>
      <div class="cbd"><div class="cbd-fill" style="width:${pct}%;background:${b.color}">
        </div><div class="cbd-count">${b.count}</div></div>
    </div>`;
  }
  html += '</div>';
  document.getElementById('cloudDist').innerHTML = html;
}

// ── ENGAGEMENT DISTRIBUTION ──
function renderEngDist(d) {
  const max = d.length || 1;
  const buckets = [
    {label:'< 30 days', count:d.filter(a=>(a.lastTouchDays||999)<=30).length,  color:'#22C55E',
      fn:`a=>(a.lastTouchDays||999)<=30`, key:'fresh'},
    {label:'30–60 days',count:d.filter(a=>{const dd=a.lastTouchDays||999;return dd>30&&dd<=60}).length, color:'#F59E0B',
      fn:`a=>{const d=a.lastTouchDays||999;return d>30&&d<=60}`, key:'warm'},
    {label:'61–90 days',count:d.filter(a=>{const dd=a.lastTouchDays||999;return dd>60&&dd<=90}).length, color:'#EF4444',
      fn:`a=>{const d=a.lastTouchDays||999;return d>60&&d<=90}`, key:'hot'},
    {label:'90+ days',  count:d.filter(a=>(a.lastTouchDays||999)>90).length,   color:'#7F1D1D',
      fn:`a=>(a.lastTouchDays||999)>90`, key:'cold'},
  ];
  let html = '<div class="eng-rows">';
  for (const b of buckets) {
    const pct = Math.round(b.count/max*100);
    const isActive = activeFilter && activeFilter.type === 'eng' && activeFilter.label === b.key;
    html += `<div class="eng-row${isActive?' active-filter':''}"
      onclick="setFilter('eng',(${b.fn}),'${b.key}')">
      <div class="eng-dot" style="background:${b.color}"></div>
      <div class="eng-label" style="font-size:12.5px">${b.label}</div>
      <div class="eng-bar"><div class="eng-fill" style="width:${pct}%;background:${b.color}"></div></div>
      <div class="eng-count" style="color:${b.color}">${b.count}</div>
    </div>`;
  }
  html += '</div>';
  document.getElementById('engDist').innerHTML = html;
}

// ── TABLE ──
function cloudsHtml(clouds) {
  if (!clouds || !clouds.length) return '<span class="no-clouds">No data</span>';
  return clouds.map(c => {
    const col = CLOUD_COLORS[c] || '#555';
    return `<span class="cloud-badge" style="background:${col}">${c}</span>`;
  }).join('');
}

function renderTable(sorted) {
  const tbody = document.getElementById('tableBody');
  if (!sorted.length) {
    tbody.innerHTML = `<tr><td colspan="9"><div class="empty">
      <div class="empty-icon">🔍</div>No accounts match the current filter</div></td></tr>`;
    return;
  }

  let html = '';
  for (const a of sorted) {
    const id = CSS.escape(a.id);
    const tClass = touchClass(a.lastTouchDays);
    const sentClass = sentimentClass(a.lastTouchSentiment);
    const daysAgo = a.lastTouchDays !== null && a.lastTouchDays !== undefined
      ? (a.lastTouchDays === 0 ? 'Today' : a.lastTouchDays + 'd ago') : '—';

    let touchHtml = `<div class="touch-date ${tClass}">${a.lastTouchFmt || '—'}
      <span style="font-weight:400;font-size:11px;margin-left:4px">${daysAgo}</span></div>`;
    if (a.lastTouchContact) {
      touchHtml += `<div class="touch-contact">${a.lastTouchContact}</div>`;
      if (a.lastTouchTitle) touchHtml += `<div class="touch-title" style="font-size:10.5px;color:var(--muted)">${a.lastTouchTitle}</div>`;
    }
    if (a.lastTouchSubject) touchHtml += `<div class="touch-subject">${a.lastTouchSubject}</div>`;

    const casesHtml = (a.openCases||0) > 0
      ? `<span class="cases-badge ${(a.openCases||0)>3?'cases-hot':'cases-warm'}">${a.openCases}</span>`
      : '<span style="color:var(--dim);font-size:12px">—</span>';

    const upsellHtml = a.lastUpsellDate
      ? `<div style="font-size:12px;font-weight:600;color:#A78BFA">${a.lastUpsellFmt}</div>
         <div style="font-size:10.5px;color:var(--muted)">${a.lastUpsellAmt||''}</div>`
      : '<span style="color:var(--dim);font-size:12px">—</span>';

    const newCloudHtml = a.lastNewCloudDate
      ? `<div style="font-size:12px;font-weight:600;color:#34D399">${a.lastNewCloudFmt}</div>`
      : '<span style="color:var(--dim);font-size:12px">—</span>';

    html += `
    <tr class="account-row" onclick="toggleDetail('${a.id}')">
      <td class="expander" id="exp_${id}">▶</td>
      <td><div class="acct-name">${a.name}</div>
          <div class="acct-ae">${a.ae}</div></td>
      <td><div class="clouds-wrap">${cloudsHtml(a.clouds)}</div></td>
      <td>${touchHtml}</td>
      <td>${upsellHtml}</td>
      <td>${newCloudHtml}</td>
      <td><div class="sentiment ${sentClass}">
        <div class="s-dot"></div>${a.lastTouchSentiment||'Neutral'}</div></td>
      <td>${casesHtml}</td>
      <td><div class="aov-val">${a.aovFmt||'—'}</div></td>
    </tr>
    <tr class="detail-row" id="det_${id}">
      <td colspan="9">${buildDetail(a)}</td>
    </tr>`;
  }
  tbody.innerHTML = html;
}

function buildDetail(a) {
  // Cloud details
  let cloudDetailHtml = '';
  if (a.clouds && a.clouds.length) {
    for (const c of a.clouds) {
      const col = CLOUD_COLORS[c] || '#555';
      const first = a.cloudFirst && a.cloudFirst[c] ? ' · first sold ' + fmtSimpleDate(a.cloudFirst[c]) : '';
      cloudDetailHtml += `<div class="cloud-detail-item">
        <span class="cloud-badge" style="background:${col}">${c}</span>
        <span style="font-size:11px;color:var(--muted)">${first}</span>
      </div>`;
    }
  } else {
    cloudDetailHtml = '<div class="no-data">No cloud data in CRM</div>';
  }

  // Recent conversations
  let convHtml = '';
  if (a.recentActivity && a.recentActivity.length) {
    for (const t of a.recentActivity) {
      const sc = sentimentClass(t.sentiment);
      convHtml += `<div class="conv-item">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div class="conv-date">${t.date} · ${t.type||''}</div>
          <div class="sentiment ${sc}" style="font-size:11px">
            <div class="s-dot"></div>${t.sentiment}</div>
        </div>
        <div class="conv-who">${t.contact}</div>
        ${t.title ? `<div class="conv-title">${t.title}</div>` : ''}
        ${t.subject ? `<div class="conv-subj">${t.subject}</div>` : ''}
      </div>`;
    }
  } else {
    convHtml = '<div class="no-data">No logged conversations found</div>';
  }

  // Upsell history
  let upsellHtml = '';
  if (a.lastUpsellDate) {
    upsellHtml += `<div class="upsell-item">
      <div class="upsell-type">Add-On Upsell</div>
      <div class="upsell-name">${a.lastUpsellName}</div>
      <div class="upsell-meta">${a.lastUpsellFmt} ${a.lastUpsellAmt ? '· '+a.lastUpsellAmt : ''}</div>
    </div>`;
  }
  if (a.lastNewCloudDate) {
    upsellHtml += `<div class="upsell-item" style="border-left-color:#34D399">
      <div class="upsell-type" style="color:#34D399">New Cloud Sold</div>
      <div class="upsell-name">${a.lastNewCloudName}</div>
      <div class="upsell-meta">${a.lastNewCloudFmt} ${a.lastNewCloudAmt ? '· '+a.lastNewCloudAmt : ''}</div>
    </div>`;
  }
  if (a.lastRenewalDate) {
    upsellHtml += `<div style="font-size:11.5px;color:var(--muted);margin-top:4px">
      Last renewal: ${a.lastRenewalFmt}</div>`;
  }
  if (!a.lastUpsellDate && !a.lastNewCloudDate) {
    upsellHtml = '<div class="no-data">No upsell history found</div>';
  }

  return `<div class="detail-inner">
    <div class="detail-grid">
      <div class="detail-section">
        <div class="detail-label">Cloud Footprint (${a.cloudCount} cloud${a.cloudCount!==1?'s':''})</div>
        ${cloudDetailHtml}
      </div>
      <div class="detail-section">
        <div class="detail-label">Recent Conversations</div>
        ${convHtml}
      </div>
      <div class="detail-section">
        <div class="detail-label">Commercial History</div>
        ${upsellHtml}
      </div>
    </div>
  </div>`;
}

function fmtSimpleDate(d) {
  if (!d) return '';
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-GB', {month:'short',year:'numeric'});
}

const openRows = new Set();
function toggleDetail(id) {
  const row = document.getElementById('det_' + CSS.escape(id));
  const exp = document.getElementById('exp_' + CSS.escape(id));
  if (!row) return;
  if (openRows.has(id)) {
    openRows.delete(id);
    row.classList.remove('open');
    if (exp) exp.textContent = '▶';
  } else {
    openRows.add(id);
    row.classList.add('open');
    if (exp) exp.textContent = '▼';
  }
}

// ── FILTER PILL ──
function renderFilterPill() {
  const el = document.getElementById('filterPill');
  if (!activeFilter) { el.innerHTML = ''; return; }
  el.innerHTML = `<div class="filter-pill">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M22 3H2l8 9.46V19l4 2V12.46z"/>
    </svg>
    ${activeFilter.label}
    <button onclick="clearFilter()">✕</button>
  </div>`;
}

// ── SORT BUTTONS ──
function renderSortBtns() {
  document.querySelectorAll('.sort-btn').forEach(btn => {
    const col = btn.getAttribute('onclick').match(/setSort\('(\w+)'\)/)?.[1];
    btn.classList.toggle('active', col === sortCol);
  });
}

// ── FULL RENDER ──
function render() {
  const aeData = getAEData(currentAE);
  const sorted = getSortedData();
  renderTabs();
  renderMetrics(aeData);
  renderCloudDist(aeData);
  renderEngDist(aeData);
  renderFilterPill();
  renderSortBtns();
  renderTable(sorted);
  document.getElementById('resultCount').textContent =
    sorted.length !== aeData.length
      ? `${sorted.length} of ${aeData.length} accounts`
      : `${sorted.length} account${sorted.length!==1?'s':''}`;
}

render();
</script>
</body>
</html>
